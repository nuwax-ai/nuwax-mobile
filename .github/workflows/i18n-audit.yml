name: i18n-audit

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - feat-2026.4.10
      - feature/**

jobs:
  i18n-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run i18n audit
        run: npm run -s i18n:audit
